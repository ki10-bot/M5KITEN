[env:m5stack-cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 8MB


build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLWIP_IP_FORWARD=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_M5STACK_CARDPUTER
    -DLW=6
    -DLH=8
    -DHAS_KEYBOARD=1
    -DHAS_NS4168_SPKR=1

lib_deps =
    m5stack/M5GFX @ ^0.2.6
    m5stack/M5Unified @ ^0.2.2
    m5stack/M5Cardputer @ ^1.0.2
    h2zero/NimBLE-Arduino @ ^1.4.2
    mathieucarbou/ESPAsyncWebServer @ ^3.2.4
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    greiman/SdFat @ ^2.2.3
    adafruit/Adafruit PN532 @ ^1.3.0

monitor_speed = 115200
upload_speed = 1500000

# Run patch.py before building — weakens the SDK's
# ieee80211_raw_frame_sanity_check symbol so our override in wifi_atks.cpp
# is used instead. Without this, raw 802.11 frame transmission (deauth,
# beacon, etc.) silently fails.
extra_scripts = pre:patch.py
